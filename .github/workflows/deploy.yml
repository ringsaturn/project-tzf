name: github pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: "https://project-tzf.ringsaturn.me"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          # hugo-version: "0.147.0"  # "latest"
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        if: ${{ github.ref_name == 'main' }}
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ github.ref_name == 'main' }}
        uses: actions/deploy-pages@v5
