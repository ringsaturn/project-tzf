
title: Project tzf
hasCJKLanguage: true
enableRobotsTXT: true
theme: hextra

baseURL: "https://project-tzf.ringsaturn.me"

defaultContentLanguage: en
languages:
  en:
    label: English
    weight: 1
    title: Project tzf

# # import hextra as module
# module:
#   imports:
#     - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    # - name: About
    #   pageRef: /about
    #   weight: 2
    - name: Blog
      pageRef: /blog
      weight: 2
    # - name: Contact ↗
    #   url: "https://github.com/imfing"
    #   weight: 3
    # - name: Search
    #   weight: 4
    #   params:
    #     type: search
    # - name: GitHub
    #   weight: 5
    #   url: "https://github.com/imfing/hextra-starter-template"
    #   params:
    #     icon: github
    # - name: Twitter
    #   weight: 6
    #   url: "https://twitter.com/"
    #   params:
    #     icon: x-twitter

params:

  # description: "An ecosystem that convert GPS coordinates to timezones."
  page:
    width: wide

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: false
    # base: "https://github.com/imfing/hextra-starter-template/edit/main/content"

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
  toc:
    displayTags: true
