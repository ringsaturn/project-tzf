
title: Project tzf
hasCJKLanguage: true
enableRobotsTXT: true
theme: hextra

baseURL: "https://project-tzf.ringsaturn.me"

defaultContentLanguage: en
languages:
  en:
    label: English
    weight: 1
    title: Project tzf
  zh-cn:
    languageName: 简体中文
    languageCode: zh-CN
    weight: 2
    title: tzf 项目

# # import hextra as module
# module:
#   imports:
#     - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    # - name: About
    #   pageRef: /about
    #   weight: 2
    - name: Blog
      pageRef: /blog
      weight: 2
    # - name: Contact ↗
    #   url: "https://github.com/imfing"
    #   weight: 3
    # - name: Search
    #   weight: 4
    #   params:
    #     type: search
    # - name: GitHub
    #   weight: 5
    #   url: "https://github.com/imfing/hextra-starter-template"
    #   params:
    #     icon: github
    # - name: Twitter
    #   weight: 6
    #   url: "https://twitter.com/"
    #   params:
    #     icon: x-twitter

params:
  page:
    width: wide

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/ringsaturn/project-tzf/edit/main/content"

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
  toc:
    displayTags: true

security:
  enableInlineShortcodes: false
  exec:
    allow:
    - ^(dart-)?sass(-embedded)?$
    - ^go$
    - ^git$
    - ^node$
    - ^postcss$
    - ^tailwindcss$
    osEnv:
    - '(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|PROGRAMDATA)$'
  funcs:
    getenv:
    - ^HUGO_
    - ^CI$
  http:
    mediaTypes: null
    methods:
    - (?i)GET|POST
    urls:
    - (?i)^https?://[a-z]
    - (?i)^https://cdn\.jsdelivr\.net/
    - '! (?i)localhost'
    - '! (?i)^https?://[^/]+@'
  node:
    permissions:
      allowAddons:
      - tailwindcss
      allowRead:
      - .
      allowWorker:
      - tailwindcss
      allowWrite: []
      disable: false
